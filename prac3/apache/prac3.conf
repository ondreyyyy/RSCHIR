# ServerName to suppress FQDN warning
ServerName localhost

# DBD for Basic Auth (MariaDB)
DBDriver mysql
DBDParams "host=db port=3306 dbname=game_profiles user=app pass=apppass"
DBDMin  1
DBDKeep 2
DBDMax  10
DBDExptime 300

# VirtualHost config
<VirtualHost *:80>
    ServerName apache
    DocumentRoot /var/www/dynamic
    DirectoryIndex index.php index.html

    <Directory /var/www/dynamic>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Location /admin>
        AuthType Basic
        AuthName "Admin Area"
        AuthBasicProvider dbd
        Require valid-user
        AuthDBDUserPWQuery "SELECT password FROM users WHERE username = %s AND active = 1"
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/dynamic-error.log
    CustomLog ${APACHE_LOG_DIR}/dynamic-access.log combined
</VirtualHost>

<VirtualHost *:80>
    DocumentRoot /srv/www/public
    <Directory /srv/www/public>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
        FallbackResource /index.php
    </Directory>

    # Включение mod_authn_dbd и настройка подключения к MySQL
    DBDriver mysql
    DBDParams "host=db port=3306 dbname=weather user=weatheruser pass=weatherpass"
    DBDMin  4
    DBDKeep 8
    DBDMax  20
    DBDExptime 300

    # Включить DBD для аутентификации
    <Directory /srv/www/public/admin>
        AuthType Basic
        AuthName "Admin Area"
        AuthBasicProvider dbd
        AuthDBDUserPWQuery "SELECT password FROM users WHERE username = %s"
        Require valid-user
    </Directory>
</VirtualHost>

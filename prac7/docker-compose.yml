version: '3.8'
services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/srv/www/static
    ports:
      - "80:80"
    depends_on:
      - apache

  apache:
    build:
      context: .
      dockerfile: Dockerfile.apache
    volumes:
      - ./public:/srv/www/public
      - ./src:/srv/www/src
      - ./templates:/srv/www/templates
      - ./storage:/srv/www/storage
      - ./apache.conf:/etc/apache2/sites-enabled/000-default.conf:ro
    depends_on:
      - db
      - redis

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: weather
      MYSQL_USER: weatheruser
      MYSQL_PASSWORD: weatherpass
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
